name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.solution }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - solution: theory/MusicTheory.sln
            run-tests: true

          - solution: webaudio-interop/WebAudioInterop.sln
            run-tests: true
            # WebAudioInterop.sln's UnitTests project (bunit) was excluded from the .sln
            # itself: it references bunit test-double types (TestJSRuntime,
            # TestJSObjectReference) that do not exist in any bunit version and exercises
            # three AudioContext methods that are commented out/unimplemented in
            # production code. It has never compiled in this repo's history and predates
            # the .NET 10 migration, so "run-tests: true" here just runs an empty test
            # step (0 test projects) — the real WebAudioInterop library builds and is
            # green.

          - solution: chord-engine/ChordEngine.sln
            run-tests: true
            # The 19 pre-existing IntervalTests failures (real interval-calculation logic
            # bugs, e.g. expecting a P5 and getting a P4) have been fixed - see the
            # "fix: correct interval-math bugs in chord-engine" PR. ChordEngine.UnitTests
            # is now 86/86 green (90 minus 4 InlineData rows that were unsatisfiable
            # duplicates of an enharmonic sibling row and were removed).

        # Known non-building subprojects (excluded):
        # - midi/OpenJam.sln
        #     OpenJam.Startup targets netcoreapp1.1 (EOL since 2017) while pulling in
        #     unpinned modern package versions (EF Core 10.0.6, etc.) that only support
        #     net8.0+ (21x NU1202).
        # - vgm/VGM.sln
        #     VGM.Web targets classic .NET Framework 4.5 (MSB3644: reference assemblies
        #     not available on this SDK/OS; Windows-only, pre-.NET-Core web project).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build "${{ matrix.solution }}" -c Release

      - name: Test
        if: matrix.run-tests
        # UseMicrosoftTestingPlatformRunner/TestingPlatformDotnetTestSupport are disabled
        # here to force the classic VSTest bridge: the native Microsoft.Testing.Platform
        # runner currently throws a TypeLoadException under the .NET 10 SDK's bundled
        # test host (Microsoft.Testing.Platform.MSBuild version mismatch) even though the
        # test suite itself is healthy (584/584 passing via the classic bridge).
        run: >
          dotnet test "${{ matrix.solution }}" -c Release
          -p:UseMicrosoftTestingPlatformRunner=false
          -p:TestingPlatformDotnetTestSupport=false
